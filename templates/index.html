<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mindful Minerals — Product Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f4ef;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      color: #2c2c2c;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    .logo {
      height: 40px;
      width: auto;
      border-radius: 4px;
      object-fit: contain;
      flex-shrink: 0;
    }
    header h1 { font-size: 1rem; font-weight: 600; letter-spacing: .03em; }
    header p  { font-size: .72rem; opacity: .65; letter-spacing: .08em; text-transform: uppercase; }
    .status-dot {
      margin-left: auto;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #6fcf97;
    }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Suggestion chips ── */
    #chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      padding: 4px 0 8px;
    }
    .chip {
      background: #fff;
      border: 1px solid #d8d0c4;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: .82rem;
      cursor: pointer;
      color: #059669;
      transition: background .15s;
    }
    .chip:hover { background: #eef4f1; }

    /* ── Messages ── */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 76%;
      animation: fadeUp .2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.user  { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot   { align-self: flex-start; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .msg.user .avatar {
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
      color: #fff;
      font-size: 12px;
      display: flex; align-items: center; justify-content: center;
    }

    .bubble {
      padding: 11px 15px;
      border-radius: 18px;
      line-height: 1.65;
      font-size: .92rem;
    }
    .msg.user .bubble {
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.bot .bubble {
      background: #fff;
      border: 1px solid #e4ddd4;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }

    .sources {
      margin-top: 8px;
      font-size: .74rem;
      color: #7a8c84;
    }
    .sources a { color: #059669; text-decoration: underline dotted; }

    /* ── Typing indicator ── */
    .typing { display: flex; gap: 5px; align-items: center; padding: 4px 2px; }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #aaa;
      animation: bounce 1.1s infinite;
    }
    .dot:nth-child(2) { animation-delay: .18s; }
    .dot:nth-child(3) { animation-delay: .36s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-7px); }
    }

    /* ── Input area ── */
    #input-area {
      padding: 12px 16px;
      background: #fff;
      border-top: 1px solid #e4ddd4;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }
    #input-area input {
      flex: 1;
      padding: 11px 16px;
      border: 1px solid #d8d0c4;
      border-radius: 24px;
      font-size: .92rem;
      font-family: inherit;
      background: #f7f4ef;
      outline: none;
      transition: border-color .15s;
    }
    #input-area input:focus { border-color: #059669; background: #fff; }
    #send-btn {
      padding: 11px 22px;
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: .03em;
      transition: background .15s;
      white-space: nowrap;
    }
    #send-btn:hover    { background: linear-gradient(135deg, #047857 0%, #065f46 100%); }
    #send-btn:disabled { opacity: .45; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <img class="logo" src="https://uploads.orevital.com/logo.jpg" alt="Mindful Minerals" />
  <div>
    <h1>Product Assistant</h1>
    <p>Mindful Minerals</p>
  </div>
  <div class="status-dot" title="Online"></div>
</header>

<div id="chat">
  <div class="msg bot">
    <img class="avatar" src="https://uploads.orevital.com/logo.jpg" alt="" />
    <div>
      <div class="bubble">
        Hi there! I can help you explore Mindful Minerals products — prices, ingredients, what's on sale, and more.<br><br>
        What would you like to know?
      </div>
      <div id="chips">
        <span class="chip" onclick="ask(this)">What toners do you carry?</span>
        <span class="chip" onclick="ask(this)">Peptide</span>
        <span class="chip" onclick="ask(this)">Dermal Renewal Peptide</span>
        <span class="chip" onclick="ask(this)">Cell code</span>
      </div>
    </div>
  </div>
</div>

<div id="input-area">
  <input id="msg" type="text" placeholder="Ask about products, prices, sale items…" autocomplete="off" />
  <button id="send-btn">Send</button>
</div>

<script>
  const chat    = document.getElementById('chat');
  const input   = document.getElementById('msg');
  const sendBtn = document.getElementById('send-btn');

  function ask(chip) {
    input.value = chip.textContent;
    sendMessage();
  }

  function addMsg(html, role, sources = []) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const avatar = role === 'bot'
      ? Object.assign(document.createElement('img'), { className: 'avatar', src: 'https://uploads.orevital.com/logo.jpg', alt: '' })
      : Object.assign(document.createElement('div'), { className: 'avatar', textContent: '👤' });

    const inner = document.createElement('div');
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = html;
    inner.appendChild(bubble);

    if (role === 'bot' && sources.length) {
      const src = document.createElement('div');
      src.className = 'sources';
      src.innerHTML = 'Sources: ' + sources.map(u =>
        `<a href="${u}" target="_blank" rel="noopener">${new URL(u).pathname}</a>`
      ).join(', ');
      inner.appendChild(src);
    }

    wrap.appendChild(avatar);
    wrap.appendChild(inner);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg bot';
    wrap.id = 'typing';
    wrap.innerHTML = `
      <img class="avatar" src="https://uploads.orevital.com/logo.jpg" alt="" />
      <div class="bubble">
        <div class="typing">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>`;
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    document.getElementById('typing')?.remove();
  }

  function escapeHtml(t) {
    return t
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || sendBtn.disabled) return;

    // Hide chips after first interaction
    document.getElementById('chips')?.remove();

    input.value = '';
    sendBtn.disabled = true;
    addMsg(escapeHtml(text), 'user');
    showTyping();

    try {
      const res  = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });
      const data = await res.json();
      removeTyping();
      if (res.ok) {
        addMsg(escapeHtml(data.response), 'bot', data.sources || []);
      } else {
        addMsg('⚠️ ' + escapeHtml(data.detail || 'Something went wrong.'), 'bot');
      }
    } catch (err) {
      removeTyping();
      addMsg('⚠️ Could not reach the server. Is the app running?', 'bot');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) sendMessage();
  });
  input.focus();
</script>
</body>
</html>
